name: Trivy Scans

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Common scan flags
  TRIVY_SEVERITY: CRITICAL,HIGH
  TRIVY_COMMON_OPTS: --ignore-unfixed --severity CRITICAL,HIGH
  # Paths & image tags
  APP_IMAGE_TAG: docker-opp-capture-app:latest
  DOCKERFILE_PATH: devops/docker/Dockerfile

jobs:
  build:
    if: false
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: block
          disable-sudo: true
          allowed-endpoints: >
            api.github.com:443
            auth.docker.io:443
            check.trivy.dev:443
            deb.debian.org:80
            files.pythonhosted.org:443
            get.trivy.dev:443
            ghcr.io:443
            github.com:443
            index.docker.io:443
            mirror.gcr.io:443
            pkg-containers.githubusercontent.com:443
            production.cloudflare.docker.com:443
            pypi.org:443
            registry-1.docker.io:443
            release-assets.githubusercontent.com:443

      - name: Checkout the source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read Ollama version
        id: version
        run: echo "tag=$(cat .ollama-version)" >> "$GITHUB_OUTPUT"

      - name: Manual Trivy Setup
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.5
        with:
          cache: true
          version: v0.69.0

      - name: Run Trivy config scanner
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # 0.34.0
        with:
          scan-type: config
          hide-progress: false
          output: trivy-config.txt
          severity: CRITICAL,HIGH,MEDIUM,LOW,UNKNOWN
          ignore-unfixed: true
          skip-setup-trivy: true

      - name: Run Trivy image scanner Ollama image
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # 0.34.0
        with:
          scan-type: image
          image-ref: "ollama/ollama:${{ steps.version.outputs.tag }}"
          hide-progress: false
          output: trivy-ollama-image.txt
          severity: CRITICAL,HIGH # Focused severity for base images
          ignore-unfixed: true
          skip-setup-trivy: true
          timeout: 15m # Large image with CUDA libraries needs extended timeout
          scanners: vuln # Skip secret scanning for faster completion on large images
      #          exit-code: 1

      - name: Publish Trivy Output to Summary Ollama image
        if: always()
        run: |
          if [[ -s trivy-config.txt ]]; then
            {
              echo "### 🛡️ Trivy Config Scan Report"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```'
              cat trivy-config.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -s trivy-ollama-image.txt ]]; then
            {
              echo "### 🐳 Trivy Image Scan Report (ollama/ollama:${{ steps.version.outputs.tag }})"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```'
              cat trivy-ollama-image.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy reports Ollama image
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: trivy-ollama-reports
          path: |
            trivy-config.txt
            trivy-ollama-image.txt

      - name: Prepare PR comment Ollama image
        if: github.event_name == 'pull_request'
        id: prep-ollama
        run: |
          CONFIG_REPORT="trivy-config.txt"
          IMAGE_REPORT="trivy-ollama-image.txt"

          # Start with a header
          BODY="## 🛡️ Trivy Scan Report

          "

          # Add Config Scan results
          # Check for the "Total: " line which only appears when findings exist
          if grep -q "Total: " "$CONFIG_REPORT"; then
            BODY+="### Config Scan: ⚠️ Issues Found
            <details><summary>Click to expand</summary>

            \`\`\`terraform
            $(cat $CONFIG_REPORT)
            \`\`\`
            </details>

            "
          else
            BODY+="### Config Scan: ✅ No issues found

            "
          fi

          # Add Image Scan results
          # Check for the "Total: " line which only appears when findings exist
          if grep -q "Total: " "$IMAGE_REPORT"; then
            BODY+="### Image Scan (ollama/ollama:${{ steps.version.outputs.tag }}): ❌ Vulnerabilities Found
            <details><summary>Click to expand</summary>

            \`\`\`
            $(cat $IMAGE_REPORT)
            \`\`\`
            </details>"
          else
            BODY+="### Image Scan (ollama/ollama:${{ steps.version.outputs.tag }}): ✅ No issues found"
          fi

          # Add a hidden marker so we can reliably find/update this comment later
          BODY+="<!-- trivy-report-ollama-sticky -->"

          # Write the formatted body to a file
          echo "$BODY" > pr-comment-ollama-body.md

      # Find existing sticky coverage comment (by hidden marker)
      - name: Find existing coverage comment Ollama image
        if: ${{ github.event_name == 'pull_request' }}
        id: fc-ollama
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- trivy-report-ollama-sticky -->"

      - name: Post findings to PR comment Ollama image
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.fc-ollama.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment-ollama-body.md
          edit-mode: replace

      - name: Build app image
        run: |
          docker build \
            -f "${{ env.DOCKERFILE_PATH }}" \
            -t "${{ env.APP_IMAGE_TAG }}" \
            .

      - name: Run Trivy image scanner opp-capture app image
        uses: aquasecurity/trivy-action@c1824fd6edce30d7ab345a9989de00bbd46ef284 # 0.34.0
        with:
          scan-type: image
          image-ref: "${{ env.APP_IMAGE_TAG }}"
          hide-progress: false
          output: trivy-app-image.txt
          severity: CRITICAL,HIGH # Focused severity for base images
          ignore-unfixed: true
          skip-setup-trivy: true
      #          exit-code: 1

      - name: Publish Trivy Output to Summary app image
        if: always()
        run: |
          if [[ -s trivy-config.txt ]]; then
            {
              echo "### 🛡️ Trivy Config Scan Report"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```'
              cat trivy-config.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -s trivy-app-image.txt ]]; then
            {
              echo "### 🐳 Trivy Image Scan Report (${{ env.APP_IMAGE_TAG }})"
              echo "<details><summary>Click to expand</summary>"
              echo ""
              echo '```'
              cat trivy-app-image.txt
              echo '```'
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload Trivy reports app image
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: trivy-app-reports
          path: |
            trivy-config.txt
            trivy-app-image.txt

      - name: Prepare PR comment app image
        if: github.event_name == 'pull_request'
        id: prep-app
        run: |
          CONFIG_REPORT="trivy-config.txt"
          IMAGE_REPORT="trivy-app-image.txt"

          # Start with a header
          BODY="## 🛡️ Trivy Scan Report

          "

          # Add Config Scan results
          # Check for the "Total: " line which only appears when findings exist
          if grep -q "Total: " "$CONFIG_REPORT"; then
            BODY+="### Config Scan: ⚠️ Issues Found
            <details><summary>Click to expand</summary>

            \`\`\`terraform
            $(cat $CONFIG_REPORT)
            \`\`\`
            </details>

            "
          else
            BODY+="### Config Scan: ✅ No issues found

            "
          fi

          # Add Image Scan results
          # Check for the "Total: " line which only appears when findings exist
          if grep -q "Total: " "$IMAGE_REPORT"; then
            BODY+="### Image Scan (${{ env.APP_IMAGE_TAG }}): ❌ Vulnerabilities Found
            <details><summary>Click to expand</summary>

            \`\`\`
            $(cat $IMAGE_REPORT)
            \`\`\`
            </details>"
          else
            BODY+="### Image Scan (${{ env.APP_IMAGE_TAG }}): ✅ No issues found"
          fi

          # Add a hidden marker so we can reliably find/update this comment later
          BODY+="<!-- trivy-report-app-sticky -->"

          # Write the formatted body to a file
          echo "$BODY" > pr-comment-app-body.md

      # Find existing sticky coverage comment (by hidden marker)
      - name: Find existing coverage comment app image
        if: ${{ github.event_name == 'pull_request' }}
        id: fc-app
        uses: peter-evans/find-comment@b30e6a3c0ed37e7c023ccd3f1db5c6c0b0c23aad # v4.0.0
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: "github-actions[bot]"
          body-includes: "<!-- trivy-report-app-sticky -->"

      - name: Post findings to PR comment app image
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@e8674b075228eee787fea43ef493e45ece1004c9 # v5
        with:
          comment-id: ${{ steps.fc-app.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body-path: pr-comment-app-body.md
          edit-mode: replace

  create-vulnerability-issues:
    if: false
    runs-on: ubuntu-latest
    needs: build
    # Only run on push to main branch (not on PRs or manual dispatches)
    # if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: block
          disable-sudo-and-containers: true
          allowed-endpoints: >
            api.github.com:443
            files.pythonhosted.org:443
            github.com:443
            pypi.org:443

      - name: Checkout the source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Trivy reports
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: trivy-*-reports
          merge-multiple: true

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create GitHub issues for vulnerabilities
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/create_trivy_issues.py
