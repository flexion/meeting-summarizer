name: CI

on:
  push:
    branches: [main, ensembling-session-2]
  pull_request:
    branches: [main, ensembling-session-2]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev ffmpeg

      - name: Install Python dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Verify build
        run: |
          uv run python -c "import transcribe_live; print('✓ transcribe_live imports successfully')"
          uv run python -c "import web_app; print('✓ web_app imports successfully')"

      - name: Run tests
        run: make test ARGS="-v --cov=. --cov-report=term --cov-report=xml"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Run pre-commit hooks
        run: uv run pre-commit run --all-files

      - name: Run linter
        run: make lint

      - name: Run type checker
        run: make type-check
