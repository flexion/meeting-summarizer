name: CI

on:
  push:
    branches: [main, thursday-session-1]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Verify build
        run: |
          python -c "import transcribe_live; print('✓ transcribe_live imports successfully')"
          python -c "import web_app; print('✓ web_app imports successfully')"

      - name: Run tests
        run: make test ARGS="-v --cov=. --cov-report=term --cov-report=xml"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: true

      - name: Run linter
        run: make lint

      - name: Run type checker
        run: make type-check
